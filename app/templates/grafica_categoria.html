<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gráfico de Categorías</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body{
            background-color:#f5f7fa;
        }

        .card{
            border:none;
            border-radius:15px;
            box-shadow:0 8px 20px rgba(0,0,0,.1);
        }

        .chart-container{
            position: relative;
            height:450px;
        }

        h2{
            color:#0d6efd;
            font-weight:bold;
        }
    </style>
</head>

<body>

<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-lg-10">

            <div class="card">

                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0">
                        📊 Cantidad de recetas por categoría
                    </h4>
                </div>

                <div class="card-body">

                    <div class="chart-container">
                        <canvas id="grafico"></canvas>
                    </div>

                </div>

            </div>

        </div>

    </div>
<!-- tabla -->
    <div class="container mt-5">
        <div class="card shadow-lg border-0">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0">
                    📋 Cantidad de recetas por categoría
                </h4>
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-striped table-hover table-bordered align-middle text-center">
                        <thead class="table-dark">
                            <tr>
                                <th>#</th>
                                <th>Categoría</th>
                                <th>Cantidad</th>
                            </tr>
                        </thead>
                        <tbody>

                            {% for i in range(categorias|length) %}
                            <tr>
                                <td>{{ loop.index }}</td>
                                <td>{{ categorias[i] }}</td>
                                <td>
                                    <span class="badge bg-success fs-6">
                                        {{ cantidades[i] }}
                                    </span>
                                </td>
                            </tr>
                            {% endfor %}

                        </tbody>

                    </table>

                </div>

            </div>

        </div>

    </div>
    <!-- <div>
        <table>
            <thead>
                <tr>
                    <th>Categoria</th>
                    <th>Cantidad</th>
                </tr>
            </thead>
            <tbody>
                {% for i in range(categorias|length)  %}
                    <tr>
                        <td>{{  categorias[i]  }}</td>
                        <td>{{  cantidades[i]  }}</td>
                    </tr> 
                {% endfor  %}

            </tbody>
        </table>
        
    </div> -->

</div>

<script>

const ctx = document.getElementById('grafico');

new Chart(ctx, {

    type: 'bar',

    data: {

        labels: {{ categorias | tojson }},

        datasets: [{
            label: 'Cantidad de recetas',
            data: {{ cantidades | tojson }},

            backgroundColor: [
                '#0d6efd',
                '#198754',
                '#ffc107',
                '#dc3545',
                '#6f42c1',
                '#20c997',
                '#fd7e14',
                '#0dcaf0'
            ],

            borderColor: '#ffffff',
            borderWidth: 2,
            borderRadius: 8
        }]
    },

    options: {

        responsive: true,
        maintainAspectRatio: false,

        plugins: {

            legend: {
                display: false
            },

            title: {
                display: true,
                text: 'Distribución de recetas por categoría',
                font: {
                    size: 20
                }
            }

        },

        scales: {

            y: {
                beginAtZero: true,
                ticks: {
                    stepSize: 1
                },
                grid: {
                    color: "#e9ecef"
                }
            },

            x: {
                grid: {
                    display: false
                }
            }

        }

    }

});

</script>

</body>
</html>
